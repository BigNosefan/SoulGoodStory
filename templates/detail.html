{% extends "base.html" %}
{% block title %}故事 · Soul Good Story{% endblock %}
{% block content %}
  <a class="back" href="{{ url_for('index') }}">← 返回首页</a>

  <div id="detail" data-sid="{{ story_id }}">
    <div class="skeleton t"></div>
    <div class="skeleton box"></div>
    <div class="skeleton t" style="width:40%"></div>
  </div>

<script>
(function () {
  var SID = document.getElementById('detail').dataset.sid;
  var LOGIN_URL = "{{ url_for('login') }}";
  var INDEX_URL = "{{ url_for('index') }}";
  var ENGINE = "{{ ai_provider }}";
  var root = document.getElementById('detail');

  // 来自发布页的"接龙载荷"：有则立即播放聚合动画，并在动画期间异步落盘 + 生成
  var relayPayload = null;
  try {
    var _raw = sessionStorage.getItem('gs_relay');
    if (_raw) {
      var _p = JSON.parse(_raw);
      if (_p && String(_p.sid) === SID) { relayPayload = _p; sessionStorage.removeItem('gs_relay'); root.innerHTML = ''; }
    }
  } catch (e) {}

  var RELAY_ERR = {
    finished: '故事已完结，无法接龙', consecutive: '不能连续接龙，请等待其他人接龙后再继续',
    conflict: '已有新的接龙，故事已更新，请基于最新内容重新接龙', length: '接龙内容长度不符',
    not_found: '故事不存在', login: '请先登录'
  };

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  // 解析正文里的 [[N|关键短语]]，渲染为可点击高亮（点击跳到第 N 段接龙）
  function fillPara(p, text) {
    var re = /\[\[(\d+)\|([^\]]*)\]\]/g, last = 0, m;
    while ((m = re.exec(text))) {
      if (m.index > last) p.appendChild(document.createTextNode(text.slice(last, m.index)));
      var a = el('a', 'hl', m[2]);
      a.dataset.seq = m[1];
      a.title = '点击查看第 ' + m[1] + ' 段接龙';
      p.appendChild(a);
      last = re.lastIndex;
    }
    if (last < text.length) p.appendChild(document.createTextNode(text.slice(last)));
  }

  function renderAi(container, paragraphs) {
    container.innerHTML = '';
    if (!paragraphs || !paragraphs.length) {
      container.appendChild(el('p', 'ai-placeholder', 'AI 正在生成故事正文……'));
      return;
    }
    paragraphs.forEach(function (t) {
      var p = el('p');
      fillPara(p, t);
      container.appendChild(p);
    });
  }

  function rateBtn(b, kind, phrases) {
    var btn = el('button', 'rate-btn ' + kind + (b.mine === kind ? ' active' : ''));
    btn.dataset.block = b.id;
    btn.dataset.kind = kind;
    var phrase = phrases[Math.floor(Math.random() * phrases.length)];
    btn.appendChild(document.createTextNode((kind === 'good' ? '👍 ' : '👎 ') + phrase + ' '));
    var cnt = el('span', 'rate-count', String(kind === 'good' ? b.good : b.bad));
    cnt.setAttribute('data-count', '');
    btn.appendChild(cnt);
    return btn;
  }

  function blockNode(b, reviews) {
    var li = el('li', 'block-item');
    li.id = 'blk-' + b.sequence;   // 高亮点击跳转锚点（按 sequence）
    li.appendChild(el('div', 'block-seq' + (b.is_genesis ? ' is-genesis' : ''), b.is_genesis ? '0' : String(b.sequence)));
    var main = el('div', 'block-main');
    var body = el('div', 'block-body');
    body.appendChild(el('div', 'block-content', b.raw_content));
    body.appendChild(el('div', 'block-foot', b.author_name + (b.is_genesis ? '（创世段）' : '') + ' · ' + b.created_at));
    if (!b.is_genesis) {
      var acts = el('div', 'block-actions');
      acts.appendChild(rateBtn(b, 'good', reviews.good));
      acts.appendChild(rateBtn(b, 'bad', reviews.bad));
      body.appendChild(acts);
    }
    main.appendChild(body);
    if (!b.is_genesis) {
      var rev = el('aside', 'ai-review');
      rev.dataset.block = b.id;
      if (b.review_ready) rev.dataset.ready = '1';
      rev.appendChild(el('div', 'ai-review-tag', '🌶️ AI辣评'));
      rev.appendChild(el('div', 'ai-review-text', b.ai_review || 'AI 正在辣评……'));
      main.appendChild(rev);
    }
    li.appendChild(main);
    return li;
  }

  function jumpTo(seq) {
    var t = document.getElementById('blk-' + seq);
    if (!t) return;
    t.scrollIntoView({ behavior: 'smooth', block: 'center' });
    t.classList.remove('flash'); void t.offsetWidth; t.classList.add('flash');
  }

  function render(d, skipAiPoll) {
    var s = d.story;
    document.title = s.title + ' · Soul Good Story';
    root.innerHTML = '';

    var head = el('div', 'story-header');
    head.appendChild(el('h1', 'page-title', s.title));
    head.appendChild(el('span', 'badge ' + (s.status === 'finished' ? 'badge-done' : 'badge-live'),
      s.status === 'finished' ? '已完结' : '进行中'));
    root.appendChild(head);

    var meta = el('div', 'meta-row');
    meta.appendChild(el('span', null, '🧩 接龙 ' + s.block_count + ' / ' + d.max_blocks));
    meta.appendChild(el('span', null, '👥 ' + s.participant_count + ' 人'));
    meta.appendChild(el('span', null, '✍️ 发起人 ' + s.creator_name));
    root.appendChild(meta);

    // 视频位：故事有 video_url 才显示，否则维持原逻辑
    if (s.video_url) {
      var vwrap = el('div', 'story-video');
      var v = document.createElement('video');
      v.src = s.video_url;
      v.controls = true;
      v.preload = 'metadata';
      v.setAttribute('playsinline', '');
      v.setAttribute('webkit-playsinline', '');
      vwrap.appendChild(v);
      root.appendChild(vwrap);
    }

    // AI 串联正文
    var box = el('section', 'ai-box');
    if (s.ai_status === 'pending') box.classList.add('is-generating');   // 边框脉冲，强化"生成中"
    var tag = el('div', 'ai-tag', '✨ 本故事由 ' + ENGINE + ' 串联生成');
    var pend = el('span', 'ai-pending', '生成中…');
    pend.id = 'ai-pending';
    if (s.ai_status !== 'pending') pend.hidden = true;
    tag.appendChild(pend);
    box.appendChild(tag);
    var content = el('div', 'ai-content');
    content.id = 'ai-content';
    renderAi(content, s.ai_paragraphs);
    box.appendChild(content);
    root.appendChild(box);

    // 接龙入口
    if (s.status === 'finished') {
      root.appendChild(el('div', 'relay-entry disabled', '故事已完结，无法接龙'));
    } else if (!d.logged_in) {
      var a = el('a', 'relay-entry', '登录后接下去写一句…');
      a.href = LOGIN_URL + '?next=' + encodeURIComponent('/publish?story_id=' + s.id);
      root.appendChild(a);
    } else if (d.consecutive) {
      root.appendChild(el('div', 'relay-entry disabled', '请等待其他人接龙后再继续（不能连续接龙）'));
    } else {
      var a2 = el('a', 'relay-entry', '接下去会发生什么？点此接龙（≤ ' + d.relay_max + ' 字）');
      a2.href = '/publish?story_id=' + s.id;
      a2.addEventListener('click', function () {   // 把上文写入缓存，发布页秒显（随后 API 刷新）
        try {
          sessionStorage.setItem('gs_ctx_' + s.id, JSON.stringify({
            ok: true, logged_in: true,
            story: { id: s.id, title: s.title, status: s.status },
            blocks: d.blocks.map(function (b) { return { sequence: b.sequence, raw_content: b.raw_content }; }),
            tail_sequence: d.blocks.length ? d.blocks[d.blocks.length - 1].sequence : 0,
            consecutive: false, max_relay: d.relay_max
          }));
        } catch (e) {}
      });
      root.appendChild(a2);
    }

    // 完结按钮（仅发起人 + 进行中）
    if (d.is_creator && s.status !== 'finished') {
      var f = el('form', 'finish-form');
      f.method = 'post';
      f.action = '/story/' + s.id + '/finish';
      var fb = el('button', 'btn-secondary', '完结故事');
      fb.type = 'submit';
      fb.onclick = function () { return confirm('确定要完结这个故事吗？完结后将无法继续接龙。'); };
      f.appendChild(fb);
      root.appendChild(f);
    }

    // 接龙记录
    var sec = el('section', 'records');
    sec.appendChild(el('h2', 'section-title', '接龙记录'));
    var ol = el('ol', 'block-list');
    var reviews = { good: d.good_reviews, bad: d.bad_reviews };
    d.blocks.forEach(function (b) { ol.appendChild(blockNode(b, reviews)); });
    sec.appendChild(ol);
    root.appendChild(sec);

    if (!skipAiPoll && s.ai_status === 'pending') pollAi();
    pollReviews();
  }

  function pollAi() {
    var timer = setInterval(function () {
      fetch('/story/' + SID + '/ai_status').then(function (r) { return r.json(); }).then(function (dd) {
        if (dd.status !== 'idle') return;
        clearInterval(timer);
        renderAi(document.getElementById('ai-content'), dd.paragraphs);
        var pe = document.getElementById('ai-pending'); if (pe) pe.hidden = true;
        var ab = document.querySelector('.ai-box'); if (ab) ab.classList.remove('is-generating');
      }).catch(function () {});
    }, 2000);
  }

  function pollReviews() {
    var pend = [].slice.call(document.querySelectorAll('.ai-review:not([data-ready])'));
    if (!pend.length) return;
    var timer = setInterval(function () {
      pend = pend.filter(function (e) { return !e.dataset.ready; });
      if (!pend.length) { clearInterval(timer); return; }
      pend.forEach(function (e) {
        fetch('/block/' + e.dataset.block + '/review').then(function (r) { return r.json(); }).then(function (dd) {
          if (dd && dd.ready && dd.review) {
            e.querySelector('.ai-review-text').textContent = dd.review;
            e.dataset.ready = '1';
          }
        }).catch(function () {});
      });
    }, 2500);
  }

  // 事件委托：高亮跳转 + 评价
  document.addEventListener('click', function (ev) {
    var hl = ev.target.closest('.hl');
    if (hl) { jumpTo(hl.dataset.seq); return; }
    var btn = ev.target.closest('.rate-btn');
    if (!btn) return;
    btn.disabled = true;
    fetch('/block/' + btn.dataset.block + '/rate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'kind=' + btn.dataset.kind
    }).then(function (r) {
      if (r.status === 401) { window.location = LOGIN_URL; return null; }
      return r.json();
    }).then(function (dd) {
      if (!dd || !dd.ok) return;
      var g = btn.parentElement.querySelector('.rate-btn.good');
      var bd = btn.parentElement.querySelector('.rate-btn.bad');
      g.querySelector('[data-count]').textContent = dd.good;
      bd.querySelector('[data-count]').textContent = dd.bad;
      g.classList.toggle('active', dd.mine === 'good');
      bd.classList.toggle('active', dd.mine === 'bad');
    }).finally(function () { btn.disabled = false; });
  });

  // ===== 提交接龙后：星球聚合（方案一）→ 详情从核心生长 =====
  function tf2(x, y, s) {
    return 'translate(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px) scale(' + (s == null ? 1 : s).toFixed(3) + ')';
  }
  function orbitR() {
    return Math.max(118, Math.min(window.innerWidth, window.innerHeight) * 0.24);
  }
  function buildOverlay(blocks) {
    var ov = el('div', 'gs-anim');
    var core = el('div', 'gs-core');
    ov.appendChild(core);
    var frags = blocks.map(function (b, i) {
      var f = el('div', 'gs-frag');
      var mv = el('div', 'gs-fragMove');
      var chip = el('div', 'gs-chip' + (i === blocks.length - 1 ? ' new' : ''));
      chip.textContent = b.raw_content;
      mv.appendChild(chip); f.appendChild(mv); ov.appendChild(f);
      return { mv: mv };
    });
    var status = el('div', 'gs-status');
    status.appendChild(el('span', 'gs-dot'));
    var sp = el('span', null, '✨ AI 正在把碎片串成星河…');
    status.appendChild(sp);
    ov.appendChild(status);
    document.body.appendChild(ov);
    return { ov: ov, core: core, status: status, sp: sp, frags: frags };
  }
  function startOrbit(refs, n) {
    var R = orbitR();
    refs.frags.forEach(function (fr, i) {
      var a0 = i / n * Math.PI * 2 - Math.PI / 2;
      var rad = R + (i % 3) * 22;
      var rx = Math.cos(a0) * rad, ry = Math.sin(a0) * rad * 0.74;
      var from = (i === n - 1) ? tf2(0, window.innerHeight * 0.32, 0.85) : tf2(rx * 1.4, ry * 1.4, 0.8);
      var intro = fr.mv.animate([{ transform: from, opacity: 0 }, { transform: tf2(rx, ry, 1), opacity: 1 }],
        { duration: 620, easing: 'cubic-bezier(.2,.8,.2,1)', fill: 'forwards' });
      intro.finished.then(function () {
        var kf = [];
        for (var s = 0; s <= 36; s++) {
          var t = s / 36, ang = a0 + t * Math.PI * 2, br = rad * (1 + 0.04 * Math.sin(t * Math.PI * 2 + i));
          kf.push({ transform: tf2(Math.cos(ang) * br, Math.sin(ang) * br * 0.74, 1) });
        }
        fr._loop = fr.mv.animate(kf, { duration: 7000, iterations: Infinity, easing: 'linear' });
      }).catch(function () {});
    });
    refs.core.animate([{ transform: 'translate(-50%,-50%) scale(0)', opacity: 0 }, { transform: 'translate(-50%,-50%) scale(.55)', opacity: .85 }],
      { duration: 700, fill: 'forwards' });
    refs._pulse = refs.core.animate([{ transform: 'translate(-50%,-50%) scale(.52)' }, { transform: 'translate(-50%,-50%) scale(.64)' }, { transform: 'translate(-50%,-50%) scale(.52)' }],
      { duration: 1800, delay: 700, iterations: Infinity, easing: 'ease-in-out' });
    setTimeout(function () { refs.status.classList.add('show'); }, 200);
  }
  function aggFinale(refs, onContent) {
    refs.sp.textContent = '✓ 已凝聚成故事';
    refs.frags.forEach(function (fr) {
      var cur = getComputedStyle(fr.mv).transform;
      if (fr._loop) fr._loop.cancel();
      fr.mv.animate([{ transform: cur, opacity: 1 }, { transform: 'translate(0px,0px) scale(.2)', opacity: 0 }],
        { duration: 720, easing: 'cubic-bezier(.5,0,.85,.3)', fill: 'forwards' });
    });
    if (refs._pulse) refs._pulse.cancel();
    refs.core.animate([{ transform: 'translate(-50%,-50%) scale(.55)', opacity: .9 },
      { transform: 'translate(-50%,-50%) scale(2.4)', opacity: 1, offset: .6 },
      { transform: 'translate(-50%,-50%) scale(3.1)', opacity: 0 }], { duration: 820, easing: 'ease-out', fill: 'forwards' });
    for (var k = 0; k < 2; k++) {
      var ring = el('div', 'gs-ring'); refs.ov.appendChild(ring);
      ring.animate([{ transform: 'translate(-50%,-50%) scale(.3)', opacity: .9 }, { transform: 'translate(-50%,-50%) scale(8)', opacity: 0 }],
        { duration: 950, delay: k * 150, easing: 'ease-out', fill: 'forwards' });
    }
    onContent();
  }
  function playRelay(payload) {
    // 立即起动画（不依赖任何请求）：用发布页带来的碎片 + 你这句
    var ctx = (payload.frags || []).slice(-6);
    var blocks = ctx.map(function (t) { return { raw_content: t }; });
    blocks.push({ raw_content: payload.text });
    var refs = buildOverlay(blocks);
    startOrbit(refs, blocks.length);
    var startT = Date.now(), MIN = 2000, GEN_CAP = 5000;
    var finaled = false, genDone = false, genParas = null, relayDone = false, capWanted = false;

    function applyParas(paras) {   // 生成完成后就地更新正文 + 去掉"生成中"脉冲
      var box = document.getElementById('ai-content'); if (box) renderAi(box, paras);
      var pe = document.getElementById('ai-pending'); if (pe) pe.hidden = true;
      var ab = document.querySelector('.ai-box'); if (ab) ab.classList.remove('is-generating');
    }
    function setGenerating() {   // 强制"生成中"视觉（脉冲 + 文案），不依赖 /data 状态
      var ab = document.querySelector('.ai-box'); if (ab) ab.classList.add('is-generating');
      var pe = document.getElementById('ai-pending'); if (pe) pe.hidden = false;
    }
    function doFinale(d) {   // 收尾：碎片入核 → 详情从核心生长
      if (finaled) return; finaled = true;
      if (capTimer) clearTimeout(capTimer);
      if (!d || !d.ok) { try { refs.ov.remove(); } catch (e) {} location.reload(); return; }
      setTimeout(function () {
        aggFinale(refs, function () {
          render(d, true);                              // 跳过 render 内部轮询，正文更新统一由本函数负责
          if (genDone && genParas) applyParas(genParas);  // 已生成完 → 填新正文、停脉冲
          else setGenerating();                           // DeepSeek 未返回 → 上一次正文 + 脉冲
          root.animate([{ opacity: 0, transform: 'scale(.16)', filter: 'blur(8px)' }, { opacity: 1, transform: 'scale(1)', filter: 'blur(0)' }],
            { duration: 800, easing: 'cubic-bezier(.2,.8,.2,1)' });
          refs.ov.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 520, delay: 240, fill: 'forwards' });
          setTimeout(function () { refs.ov.remove(); }, 820);
        });
      }, Math.max(0, MIN - (Date.now() - startT)));
    }
    function tryFallback() {   // 5s 到 + 已落盘 + 未生成完 → 用当前数据先回详情（带脉冲），正文随后补
      if (finaled || genDone || !relayDone) return;
      fetch('/story/' + SID + '/data').then(function (r) { return r.json(); }).then(doFinale).catch(function () { doFinale(null); });
    }
    function fail(msg) {
      if (finaled) return; finaled = true;
      if (capTimer) clearTimeout(capTimer);
      try { refs.ov.remove(); } catch (e) {}
      fetch('/story/' + SID + '/data').then(function (r) { return r.json(); })
        .then(function (d) { if (d && d.ok) render(d); if (msg) alert(msg); })
        .catch(function () { root.innerHTML = '<p class="subtitle">加载失败，<a class="link" href="' + INDEX_URL + '">返回首页</a></p>'; });
    }
    function watchGen() {   // 单一生成来源：首个 /ai_status 同步触发 DeepSeek，完成时返回 idle
      fetch('/story/' + SID + '/ai_status').then(function (r) { return r.json(); }).then(function (s) {
        if (s.status === 'idle') {
          genDone = true; genParas = s.paragraphs;
          if (finaled) applyParas(s.paragraphs);   // 已兜底回详情 → 就地把正文补上
          else { if (capTimer) clearTimeout(capTimer); fetch('/story/' + SID + '/data').then(function (r) { return r.json(); }).then(doFinale).catch(function () { doFinale(null); }); }
        } else { setTimeout(watchGen, 1200); }
      }).catch(function () { if (!genDone) setTimeout(watchGen, 1500); });
    }

    // 5s 兜底（从动画开始计时）：到点若已落盘且未生成完，则先回详情页（带脉冲）
    var capTimer = setTimeout(function () { capWanted = true; tryFallback(); }, GEN_CAP);

    // 异步：先落盘接龙；成功后开生成监听；若 5s 已先到则落盘后立即兜底
    var body = 'content=' + encodeURIComponent(payload.text) +
      '&expected_sequence=' + encodeURIComponent(payload.expected == null ? '' : payload.expected);
    fetch('/story/' + SID + '/relay', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body })
      .then(function (r) { if (r.status === 401) { location.href = LOGIN_URL; return null; } return r.json(); })
      .then(function (res) {
        if (!res) return;
        if (!res.ok) { fail(RELAY_ERR[res.error] || '接龙失败'); return; }
        relayDone = true;
        watchGen();
        if (capWanted) tryFallback();
      })
      .catch(function () { fail('网络异常，请重试'); });
  }

  // 入口：刚接龙（带载荷）→ 立即播放聚合动画；否则正常渲染
  if (relayPayload) {
    playRelay(relayPayload);
  } else {
    fetch('/story/' + SID + '/data').then(function (r) {
      if (!r.ok) throw 0;
      return r.json();
    }).then(function (d) {
      if (!d.ok) throw 0;
      render(d);
    }).catch(function () {
      root.innerHTML = '<p class="subtitle">故事不存在或加载失败。<a class="link" href="' + INDEX_URL + '">返回首页</a></p>';
    });
  }
})();
</script>
{% endblock %}
